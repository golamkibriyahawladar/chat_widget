<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physio Chat Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 600px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 5px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .chat-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.8;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f5f5f5;
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #e9ecef;
            border-radius: 18px;
            width: fit-content;
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .input-container {
            display: flex;
            padding: 16px;
            gap: 12px;
            background: white;
            border-top: 1px solid #e9ecef;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 24px;
            padding: 0 16px;
            border: 1px solid #e9ecef;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-wrapper input {
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 14px;
            outline: none;
            width: 100%;
            color: #333;
        }

        .input-wrapper input::placeholder {
            color: #999;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        .welcome-message {
            text-align: center;
            color: #999;
            font-size: 14px;
            padding: 20px;
        }

        .error-message {
            background: #ffe6e6;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin: 8px 0;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            transform: scale(1.1);
        }

        .modal-body {
            padding: 24px;
            text-align: center;
        }

        .modal-body p {
            font-size: 15px;
            color: #333;
            line-height: 1.6;
            margin: 0;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid #e9ecef;
        }

        .modal-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Physio Chat Bot</h1>
            <p>AI Assistant</p>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="welcome-message">
                Start a conversation with the AI Assistant
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Type a message..."
                    autocomplete="off"
                >
            </div>
            <button class="send-btn" id="sendBtn" title="Send message">
                ➤
            </button>
        </div>
    </div>

    <!-- Question Ready Popup -->
    <div class="modal-overlay" id="questionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📝 Question Ready</h2>
                <button class="modal-close" id="closeModalBtn">×</button>
            </div>
            <div class="modal-body">
                <p id="modalMessage">Your question is ready. Go for the test!</p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn btn-secondary" id="closeBtn">Later</button>
                <button class="modal-btn btn-primary" id="goToExamBtn">Go to Test</button>
            </div>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesContainer = document.getElementById('messagesContainer');
        const questionModal = document.getElementById('questionModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const closeBtn = document.getElementById('closeBtn');
        const goToExamBtn = document.getElementById('goToExamBtn');

        const WEBHOOK_URL = 'https://n8n2.srv980217.hstgr.cloud/webhook-test/physio_chatbot';
        const EXAM_PAGE_URL = './exam.html';

        // Clear welcome message on first message
        let welcomeShown = true;

        function clearWelcome() {
            if (welcomeShown) {
                messagesContainer.innerHTML = '';
                welcomeShown = false;
            }
        }

        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;

            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);

            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            return messageDiv;
        }

        function showTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';

            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';

            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'typing-dot';
                typingDiv.appendChild(dot);
            }

            messageDiv.appendChild(typingDiv);
            messageDiv.id = 'typingIndicator';
            messagesContainer.appendChild(messageDiv);

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        function showQuestionModal(message = 'Your question is ready. Go for the test!') {
            const modalMessage = document.getElementById('modalMessage');
            modalMessage.textContent = message;
            questionModal.classList.add('show');
        }

        function hideQuestionModal() {
            questionModal.classList.remove('show');
        }

        // Modal event listeners
        closeModalBtn.addEventListener('click', hideQuestionModal);
        closeBtn.addEventListener('click', hideQuestionModal);

        goToExamBtn.addEventListener('click', () => {
            hideQuestionModal();
            // Open exam page in new tab or navigate
            window.open(EXAM_PAGE_URL, 'exam_window');
        });

        // Close modal when clicking outside
        questionModal.addEventListener('click', (e) => {
            if (e.target === questionModal) {
                hideQuestionModal();
            }
        });

        async function sendMessage() {
            const text = messageInput.value.trim();

            if (!text) return;

            clearWelcome();
            addMessage(text, true);
            messageInput.value = '';
            sendBtn.disabled = true;

            showTypingIndicator();

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: text,
                        timestamp: new Date().toISOString()
                    })
                });

                removeTypingIndicator();

                if (response.ok) {
                    const data = await response.json();

                    // Handle different response formats
                    let botResponse = '';
                    let showQuestionPopup = false;

                    if (typeof data === 'string') {
                        botResponse = data;
                    } else if (data.message) {
                        botResponse = data.message;
                    } else if (data.response) {
                        botResponse = data.response;
                    } else if (data.text) {
                        botResponse = data.text;
                    } else {
                        botResponse = JSON.stringify(data);
                    }

                    // Check if response indicates a question is ready
                    if (data.questionReady || data.showQuestionModal || botResponse.toLowerCase().includes('question ready')) {
                        showQuestionPopup = true;
                    }

                    addMessage(botResponse, false);

                    // Show question modal if indicated
                    if (showQuestionPopup) {
                        setTimeout(() => {
                            showQuestionModal(data.modalMessage || 'Your question is ready. Go for the test!');
                        }, 500);
                    }
                } else {
                    removeTypingIndicator();
                    addMessage('Sorry, there was an error. Status: ' + response.status, false);
                }
            } catch (error) {
                removeTypingIndicator();
                console.error('Error:', error);
                addMessage('Sorry, I could not connect to the server. Please check your connection.', false);
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Listen for question ready notifications from external sources
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'QUESTION_READY') {
                showQuestionModal(event.data.message || 'Your question is ready. Go for the test!');
                if (event.data.botMessage) {
                    clearWelcome();
                    addMessage(event.data.botMessage, false);
                }
            }
        });

        // Webhook listener for incoming notifications
        // This can be used if your backend pushes notifications via webhook
        async function setupWebhookListener() {
            // In a real scenario, you'd have a dedicated webhook endpoint
            // for notifications that calls this function or uses WebSocket
            try {
                // Example: Poll for notifications (not recommended for production)
                // Instead, use WebSocket or Server-Sent Events
            } catch (error) {
                console.error('Error setting up webhook listener:', error);
            }
        }

        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
