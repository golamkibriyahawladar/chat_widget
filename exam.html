<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physio Exam - MCQ Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .exam-container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .exam-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .exam-title h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .exam-title p {
            font-size: 13px;
            opacity: 0.8;
        }

        .timer-section {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .timer-display {
            background: rgba(255, 255, 255, 0.2);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            min-width: 100px;
            text-align: center;
        }

        .timer-display.warning {
            background: rgba(255, 193, 7, 0.25);
            color: #fff3cd;
        }

        .timer-display.critical {
            background: rgba(255, 57, 57, 0.35);
            color: #ffd6d6;
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .start-btn,
        .restart-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid white;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .start-btn:hover,
        .restart-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }

        .start-btn:disabled,
        .restart-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .exam-body {
            padding: 40px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .exam-body::-webkit-scrollbar {
            width: 6px;
        }

        .exam-body::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .topic-badge {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 14px;
            background: #eef2ff;
            color: #5a67d8;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }


        .passage-section {
            margin-bottom: 32px;
            padding: 20px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            max-height: 260px;
            overflow-y: auto;
        }

        .passage-title {
            font-size: 14px;
            color: #667eea;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .passage-text {
            font-size: 15px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
        }

        .question-section {
            margin-bottom: 28px;
        }

        .question-text {
            font-size: 17px;
            font-weight: 700;
            color: #222;
            margin-bottom: 20px;
            padding: 16px;
            background: #f0f4ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            line-height: 1.6;
        }

        .options-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: flex-start;
            padding: 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: white;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option input[type="radio"] {
            margin-right: 12px;
            margin-top: 2px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
        }

        .option-label {
            cursor: pointer;
            flex: 1;
            font-size: 15px;
            color: #333;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .option.selected {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .option.disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .option input:disabled {
            cursor: not-allowed;
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
        }

        .status-message.info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #1976d2;
        }

        .status-message.warning {
            background: #fff3e0;
            color: #e65100;
            border-left: 4px solid #ff6f00;
        }

        .status-message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .answer-feedback {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.35s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .answer-feedback.show {
            display: block;
        }

        .answer-feedback.correct {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }

        .answer-feedback.incorrect {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }

        .feedback-title {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .answer-feedback.correct .feedback-title {
            color: #2e7d32;
        }

        .answer-feedback.incorrect .feedback-title {
            color: #c62828;
        }

        .feedback-text {
            font-size: 14px;
            line-height: 1.7;
        }

        .answer-feedback.correct .feedback-text {
            color: #1b5e20;
        }

        .answer-feedback.incorrect .feedback-text {
            color: #b71c1c;
        }

        .submit-section {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
        }

        .submit-btn {
            flex: 1;
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
        }

        .submit-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .reset-btn {
            padding: 14px 24px;
            background: #f5f5f5;
            color: #333;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reset-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .not-started {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .not-started p {
            font-size: 16px;
            margin-bottom: 14px;
        }

        .exam-completed {
            text-align: center;
            padding: 36px 20px 10px;
        }

        .exam-completed h2 {
            font-size: 24px;
            color: #4caf50;
            margin-bottom: 12px;
        }

        .exam-completed p {
            color: #666;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #777;
        }

        @media (max-width: 768px) {
            .exam-body {
                padding: 22px;
            }

            .exam-header {
                padding: 18px;
            }

            .exam-title h1 {
                font-size: 20px;
            }

            .question-text {
                font-size: 16px;
            }

            .submit-section {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="exam-container">
        <div class="exam-header">
            <div class="exam-title">
                <h1>Physio Exam</h1>
                <p>MCQ Assessment Test</p>
            </div>

            <div class="timer-section">
                <div class="timer-display" id="timerDisplay">00:00</div>
                <button class="start-btn" id="startBtn">▶ Start Exam</button>
                <button class="restart-btn" id="restartBtn">↻ Restart</button>
            </div>
        </div>

        <div class="exam-body" id="examBody">
            <div class="not-started">
                <p>Click <strong>Start Exam</strong> to begin the assessment.</p>
                <p style="font-size: 13px; color: #aaa;">Question data will load from your chat page popup trigger.</p>
            </div>
        </div>
    </div>

    <script>
        const SUBMIT_URL = '/api/webhook/physio_exam';

        let examData = {
            topic: 'General Topic',
            timeLimit: 600,
            passage: '',
            question: '',
            options: [],
            correctAnswer: 0
        };

        let state = {
            started: false,
            submitted: false,
            timeRemaining: 0,
            selectedAnswer: null,
            timerInterval: null
        };

        const examBody = document.getElementById('examBody');
        const timerDisplay = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            timerDisplay.textContent = formatTime(state.timeRemaining);
            timerDisplay.classList.remove('warning', 'critical');

            if (state.timeRemaining <= 30 && state.timeRemaining > 10) {
                timerDisplay.classList.add('warning');
            } else if (state.timeRemaining <= 10) {
                timerDisplay.classList.add('critical');
            }
        }

        function startTimer() {
            state.started = true;
            startBtn.disabled = true;
            restartBtn.disabled = false;

            state.timerInterval = setInterval(() => {
                state.timeRemaining--;
                updateTimerDisplay();

                if (state.timeRemaining <= 0) {
                    clearInterval(state.timerInterval);
                    state.timeRemaining = 0;
                    updateTimerDisplay();
                    endExamByTimeout();
                }
            }, 1000);
        }

        function stopTimer() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
        }

        function endExamByTimeout() {
            state.started = false;

            if (!state.submitted) {
                submitAnswer(true);
            }
        }

        function resetStateForNewExam() {
            stopTimer();
            state.started = false;
            state.submitted = false;
            state.selectedAnswer = null;
            state.timeRemaining = Number(examData.timeLimit) || 600;

            timerDisplay.classList.remove('warning', 'critical');
            updateTimerDisplay();

            startBtn.disabled = false;
            startBtn.textContent = '▶ Start Exam';
        }

        function makeExamReadOnly() {
            document.querySelectorAll('.option-radio').forEach(input => {
                input.disabled = true;
            });
            document.querySelectorAll('.option').forEach(option => {
                option.classList.add('disabled');
            });

            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn) {
                submitBtn.disabled = true;
            }
        }

        function renderEmptyState(message) {
            examBody.innerHTML = `
                <div class="empty-state">
                    <h2 style="margin-bottom: 12px; color: #555;">No Exam Data Found</h2>
                    <p>${message}</p>
                </div>
            `;
        }

        function renderExam() {
            if (!examData.question || !Array.isArray(examData.options) || examData.options.length === 0) {
                renderEmptyState('Please trigger a question first from your chat page or API.');
                return;
            }

            let html = '';

            if (examData.topic) {
                html += `<div class="topic-badge">Topic: ${escapeHtml(examData.topic)}</div>`;
            }

            if (!state.submitted) {
                html += `<div class="status-message info">⏱️ Exam is ready. Click Start Exam, choose one option, then submit.</div>`;
            } else {
                const statusClass = state.selectedAnswer === examData.correctAnswer ? 'success' : 'warning';
                const statusText = state.selectedAnswer === examData.correctAnswer
                    ? 'Your response has been submitted successfully.'
                    : 'Your response has been submitted. Review the correct answer below.';
                html += `<div class="status-message ${statusClass}">${statusText}</div>`;
            }

            if (examData.passage) {
                html += `
                    <div class="passage-section">
                        <div class="passage-title">📖 Passage</div>
                        <div class="passage-text">${escapeHtml(examData.passage)}</div>
                    </div>
                `;
            }

            html += `
                <div class="question-section">
                    <div class="question-text">❓ ${escapeHtml(examData.question)}</div>
                    <div class="options-section">
            `;

            examData.options.forEach((option, index) => {
                const checked = state.selectedAnswer === index ? 'checked' : '';
                const selectedClass = state.selectedAnswer === index ? 'selected' : '';
                const disabled = (!state.started || state.submitted) ? 'disabled' : '';

                html += `
                    <label class="option ${selectedClass}">
                        <input
                            type="radio"
                            name="answer"
                            class="option-radio"
                            value="${index}"
                            ${checked}
                            ${disabled}
                        >
                        <span class="option-label">${escapeHtml(option)}</span>
                    </label>
                `;
            });

            html += `
                    </div>
                </div>
            `;

            if (state.submitted) {
                const isCorrect = state.selectedAnswer === examData.correctAnswer;
                const userAnswerText = state.selectedAnswer !== null && state.selectedAnswer >= 0
                    ? examData.options[state.selectedAnswer]
                    : 'No Answer';

                html += `
                    <div class="answer-feedback show ${isCorrect ? 'correct' : 'incorrect'}">
                        <div class="feedback-title">${isCorrect ? '✓ Correct!' : '✗ Incorrect'}</div>
                        <div class="feedback-text">
                            <strong>Your answer:</strong> ${escapeHtml(userAnswerText)}<br>
                            <strong>Correct answer:</strong> ${escapeHtml(examData.options[examData.correctAnswer] || '')}
                        </div>
                    </div>

                    <div class="exam-completed">
                        <h2>✓ Assessment Completed</h2>
                        <p>Your response has been recorded.</p>
                        <p style="font-size: 13px; color: #999;">You can close this window or wait for another question.</p>
                    </div>
                `;
            } else {
                html += `
                    <div class="submit-section">
                        <button class="submit-btn" id="submitBtn" ${(!state.started || state.selectedAnswer === null) ? 'disabled' : ''}>
                            Submit Answer
                        </button>
                        <button class="reset-btn" id="clearBtn" ${!state.started ? 'disabled' : ''}>
                            Clear Selection
                        </button>
                    </div>
                `;
            }

            examBody.innerHTML = html;
            attachEventListeners();
        }

        function attachEventListeners() {
            const radios = document.querySelectorAll('.option-radio');
            radios.forEach((radio, index) => {
                radio.addEventListener('change', () => {
                    if (!state.started || state.submitted) return;

                    state.selectedAnswer = index;

                    document.querySelectorAll('.option').forEach((option, optIndex) => {
                        option.classList.toggle('selected', optIndex === index);
                    });

                    const submitBtn = document.getElementById('submitBtn');
                    if (submitBtn) {
                        submitBtn.disabled = false;
                    }
                });
            });

            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', () => submitAnswer(false));
            }

            const clearBtn = document.getElementById('clearBtn');
            if (clearBtn) {
                clearBtn.addEventListener('click', clearSelection);
            }
        }

        function clearSelection() {
            if (!state.started || state.submitted) return;

            state.selectedAnswer = null;
            document.querySelectorAll('.option-radio').forEach(radio => {
                radio.checked = false;
            });
            document.querySelectorAll('.option').forEach(option => {
                option.classList.remove('selected');
            });

            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn) {
                submitBtn.disabled = true;
            }
        }

        async function submitAnswer(isAutoSubmit) {
            if (state.submitted) return;

            if (state.selectedAnswer === null && !isAutoSubmit) {
                alert('Please select an option first.');
                return;
            }

            state.submitted = true;
            state.started = false;
            stopTimer();

            const finalSelected = state.selectedAnswer === null ? -1 : state.selectedAnswer;
            const isCorrect = finalSelected === examData.correctAnswer;

            try {
                const response = await fetch(SUBMIT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic: examData.topic,
                        passage: examData.passage,
                        question: examData.question,
                        options: examData.options,
                        selectedAnswer: finalSelected,
                        selectedText: finalSelected >= 0 ? examData.options[finalSelected] : 'No Answer',
                        correctAnswer: examData.correctAnswer,
                        correctText: examData.options[examData.correctAnswer] || '',
                        isCorrect: isCorrect,
                        timeUsed: (Number(examData.timeLimit) || 600) - state.timeRemaining,
                        timestamp: new Date().toISOString()
                    })
                });

                const result = await response.json();
                console.log('Submit response:', result);
            } catch (error) {
                console.error('Error submitting exam:', error);
            }

            makeExamReadOnly();
            renderExam();
            localStorage.removeItem('current_exam_data');
        }

        function loadExamData() {
            try {
                const raw = localStorage.getItem('current_exam_data');
                if (!raw) {
                    return false;
                }

                const parsed = JSON.parse(raw);

                examData = {
                    topic: parsed.topic || 'General Topic',
                    passage: parsed.passage || '',
                    question: parsed.question || '',
                    options: Array.isArray(parsed.options) ? parsed.options : [],
                    correctAnswer: Number(parsed.correctAnswer) || 0,
                    timeLimit: Number(parsed.timeLimit) || 600
                };

                resetStateForNewExam();
                return true;
            } catch (error) {
                console.error('Failed to load exam data:', error);
                return false;
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        startBtn.addEventListener('click', () => {
            if (!examData.question) {
                alert('No exam data found. Please trigger a question first.');
                return;
            }

            if (!state.started && !state.submitted) {
                startTimer();
                renderExam();
            }
        });

        restartBtn.addEventListener('click', () => {
            const loaded = loadExamData();
            if (!loaded) {
                renderEmptyState('No new exam data is available right now.');
                return;
            }
            renderExam();
        });

        window.addEventListener('load', () => {
            const loaded = loadExamData();
            if (!loaded) {
                renderEmptyState('Open the chat page, wait for the popup, then click Go to Exam.');
                timerDisplay.textContent = '00:00';
                restartBtn.disabled = true;
                return;
            }

            restartBtn.disabled = false;
            renderExam();
        });
    </script>
</body>

</html>
