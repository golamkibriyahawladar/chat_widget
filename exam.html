<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Physio Exam</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f7f6;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .exam-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .timer {
            color: #e74c3c;
            font-weight: bold;
            font-size: 18px;
        }

        .passage-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #667eea;
            margin-bottom: 20px;
            font-style: italic;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            background: white;
            transition: 0.2s;
        }

        .option-btn:hover {
            background: #f0f2ff;
            border-color: #667eea;
        }
    </style>
</head>

<body>
    <div class="exam-container">
        <div class="header">
            <h2 id="exam-topic">Topic Name</h2>
            <div class="timer">Time Left: <span id="time-counter">00:00</span></div>
        </div>

        <div class="passage-box" id="exam-passage">Loading passage...</div>

        <div class="question-text" id="exam-question">Loading question...</div>

        <div class="options-container" id="options-list">
        </div>
    </div>

    <script>
        window.onload = function () {
            const rawData = localStorage.getItem('current_exam_data');
            if (!rawData) {
                alert("No question found!");
                return;
            }

            const data = JSON.parse(rawData);

            // ১. ডেটা সেট করা
            document.getElementById('exam-topic').textContent = data.topic;
            document.getElementById('exam-passage').textContent = data.passage;
            document.getElementById('exam-question').textContent = data.question;

            // ২. অপশনগুলো তৈরি করা
            const optionsList = document.getElementById('options-list');
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(index, data.correctAnswer);
                optionsList.appendChild(btn);
            });

            // ৩. টাইমার শুরু (counter)
            let timeLeft = data.timeLimit || 600;
            const timerDisplay = document.getElementById('time-counter');

            const timerInterval = setInterval(() => {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerDisplay.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Time is up!");
                }
                timeLeft--;
            }, 1000);
        };

        function checkAnswer(selected, correct) {
            if (selected === correct) {
                alert("Correct Answer!");
            } else {
                alert("Wrong Answer!");
            }
        }
    </script>
</body>

</html>
