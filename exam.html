<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physio Exam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .exam-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .timer {
            color: #e74c3c;
            font-weight: bold;
            font-size: 18px;
        }

        .passage-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #764ba2;
            margin-bottom: 20px;
            line-height: 1.6;
            color: #444;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            background: white;
            font-size: 15px;
            transition: 0.2s;
        }

        .option-btn:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .option-btn.selected {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }

        .submit-area {
            margin-top: 30px;
            text-align: center;
        }

        .submit-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="exam-container">
        <div class="header">
            <h2 id="topic">Topic</h2>
            <div class="timer">Time Left: <span id="counter">00:00</span></div>
        </div>

        <div class="passage-box" id="passage">Loading passage...</div>
        <div class="question-text" id="question">Loading question...</div>

        <div class="options-container" id="options"></div>

        <div class="submit-area">
            <button class="submit-btn" onclick="submitExam()">Submit Answer</button>
        </div>
    </div>

    <script>
        let selectedOption = null;

        window.onload = function () {
            const rawData = localStorage.getItem('current_exam_data');
            if (!rawData) {
                document.body.innerHTML = "<h1>No Exam Data Found!</h1>";
                return;
            }

            const data = JSON.parse(rawData);

            // Set Data
            document.getElementById('topic').textContent = data.topic;
            document.getElementById('passage').textContent = data.passage;
            document.getElementById('question').textContent = data.question;

            // Render Options
            const optionsDiv = document.getElementById('options');
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = function () {
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedOption = index;
                };
                optionsDiv.appendChild(btn);
            });

            // Timer
            let timeLeft = data.timeLimit || 600;
            const counterSpan = document.getElementById('counter');

            const timer = setInterval(() => {
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                counterSpan.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    alert("Time is up!");
                    submitExam();
                }
                timeLeft--;
            }, 1000);
        };

        function submitExam() {
            const rawData = JSON.parse(localStorage.getItem('current_exam_data'));
            if (selectedOption === null) {
                alert("Please select an option first!");
                return;
            }

            if (selectedOption === rawData.correctAnswer) {
                alert("Correct Answer! Well done.");
            } else {
                alert("Wrong Answer! The correct one was: " + rawData.options[rawData.correctAnswer]);
            }

            window.close();
        }
    </script>
</body>

</html>
