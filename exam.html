<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physio Exam - MCQ Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .exam-container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .exam-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .exam-title h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .exam-title p {
            font-size: 13px;
            opacity: 0.8;
        }

        .timer-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .timer-display {
            background: rgba(255, 255, 255, 0.2);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            min-width: 100px;
            text-align: center;
        }

        .timer-display.warning {
            background: rgba(255, 107, 107, 0.3);
            color: #ffcccc;
        }

        .timer-display.critical {
            background: rgba(255, 57, 57, 0.4);
            color: #ff6b6b;
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .start-btn, .restart-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .start-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .restart-btn {
            display: none;
        }

        .exam-body {
            padding: 40px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .exam-body::-webkit-scrollbar {
            width: 6px;
        }

        .exam-body::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .passage-section {
            margin-bottom: 40px;
            padding: 20px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 8px;
        }

        .passage-title {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .passage-text {
            font-size: 15px;
            line-height: 1.8;
            color: #333;
        }

        .question-section {
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 600;
            color: #222;
            margin-bottom: 20px;
            padding: 16px;
            background: #f0f4ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .options-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: flex-start;
            padding: 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: white;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option input[type="checkbox"] {
            margin-right: 12px;
            margin-top: 2px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .option-label {
            cursor: pointer;
            flex: 1;
            font-size: 15px;
            color: #333;
            line-height: 1.5;
        }

        .option.selected {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .option:disabled,
        .option.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .option input:disabled {
            cursor: not-allowed;
        }

        .answer-feedback {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .answer-feedback.show {
            display: block;
        }

        .answer-feedback.correct {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }

        .answer-feedback.incorrect {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .answer-feedback.correct .feedback-title {
            color: #2e7d32;
        }

        .answer-feedback.incorrect .feedback-title {
            color: #c62828;
        }

        .feedback-text {
            font-size: 14px;
            line-height: 1.6;
        }

        .answer-feedback.correct .feedback-text {
            color: #1b5e20;
        }

        .answer-feedback.incorrect .feedback-text {
            color: #b71c1c;
        }

        .submit-section {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
        }

        .submit-btn {
            flex: 1;
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            padding: 14px 24px;
            background: #f5f5f5;
            color: #333;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reset-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .not-started {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .not-started p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .status-message.info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #1976d2;
        }

        .status-message.warning {
            background: #fff3e0;
            color: #e65100;
            border-left: 4px solid #ff6f00;
        }

        .status-message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .exam-completed {
            text-align: center;
            padding: 40px 20px;
        }

        .exam-completed h2 {
            font-size: 24px;
            color: #4caf50;
            margin-bottom: 12px;
        }

        .exam-completed p {
            color: #666;
            margin-bottom: 24px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="exam-container">
        <div class="exam-header">
            <div class="exam-title">
                <h1>Physio Exam</h1>
                <p>MCQ Assessment Test</p>
            </div>
            <div class="timer-section">
                <div class="timer-display" id="timerDisplay">00:00</div>
                <button class="start-btn" id="startBtn">▶ Start Exam</button>
                <button class="restart-btn" id="restartBtn">↻ Restart</button>
            </div>
        </div>

        <div class="exam-body" id="examBody">
            <div class="not-started">
                <p>Click <strong>"Start Exam"</strong> button to begin the assessment</p>
                <p style="font-size: 13px; color: #bbb;">The timer will start when you click Start</p>
            </div>
        </div>
    </div>

    <script>
        // ============== Configuration ==============
        const WEBHOOK_URL = 'https://n8n2.srv980217.hstgr.cloud/webhook-test/physio_exam';
        
        // Default exam data (will be replaced by webhook)
        let examData = {
            timeLimit: 300, // 5 minutes default
            passage: 'The human skeleton serves multiple functions including support, protection of vital organs, and production of blood cells. Bones are living tissues that constantly remodel themselves. The axial skeleton includes the skull, spine, and ribcage, while the appendicular skeleton comprises the limbs.',
            question: 'Which of the following is NOT a function of the skeleton?',
            options: [
                'Support and framework for the body',
                'Protection of vital organs',
                'Production of hormones in all bones',
                'Production of blood cells'
            ],
            correctAnswer: 2
        };

        // ============== State Management ==============
        let state = {
            started: false,
            submitted: false,
            timeRemaining: examData.timeLimit,
            selectedAnswer: null,
            timerInterval: null
        };

        // ============== DOM Elements ==============
        const examBody = document.getElementById('examBody');
        const timerDisplay = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // ============== Timer Functions ==============
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function startTimer() {
            state.started = true;
            state.timeRemaining = examData.timeLimit;
            startBtn.disabled = true;

            state.timerInterval = setInterval(() => {
                state.timeRemaining--;
                updateTimerDisplay();

                if (state.timeRemaining <= 0) {
                    clearInterval(state.timerInterval);
                    endExam();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            timerDisplay.textContent = formatTime(state.timeRemaining);
            
            if (state.timeRemaining <= 10) {
                timerDisplay.classList.add('critical');
            } else if (state.timeRemaining <= 30) {
                timerDisplay.classList.add('warning');
            }
        }

        function endExam() {
            state.started = false;
            startBtn.textContent = '⏹ Time Over';
            makeExamReadOnly();
            
            if (!state.submitted) {
                const statusDiv = document.querySelector('.status-message');
                if (statusDiv) {
                    statusDiv.innerHTML = '<strong>⏰ Time\'s up!</strong> Your exam has ended. No further changes can be made.';
                    statusDiv.className = 'status-message warning';
                }
            }
        }

        function makeExamReadOnly() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.disabled = true;
            });

            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.classList.add('disabled');
            });

            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn && !state.submitted) {
                submitBtn.disabled = true;
            }
        }

        // ============== Render Exam ==============
        function renderExam() {
            let html = '';

            // Status message
            html += '<div class="status-message info">⏱️ Exam in progress. Answer the question carefully.</div>';

            // Passage
            if (examData.passage) {
                html += `
                    <div class="passage-section">
                        <div class="passage-title">📖 Passage</div>
                        <div class="passage-text">${examData.passage}</div>
                    </div>
                `;
            }

            // Question
            html += `
                <div class="question-section">
                    <div class="question-text">❓ ${examData.question}</div>
                    <div class="options-section" id="optionsSection">
            `;

            // Options
            examData.options.forEach((option, index) => {
                const isSelected = state.selectedAnswer === index;
                const selectedClass = isSelected ? 'selected' : '';
                
                html += `
                    <label class="option ${selectedClass}">
                        <input 
                            type="checkbox" 
                            value="${index}"
                            ${isSelected ? 'checked' : ''}
                            ${state.submitted || !state.started ? 'disabled' : ''}
                            class="option-checkbox"
                        >
                        <span class="option-label">${option}</span>
                    </label>
                `;
            });

            html += `
                    </div>
                </div>
            `;

            // Answer feedback (if submitted)
            if (state.submitted) {
                const isCorrect = state.selectedAnswer === examData.correctAnswer;
                const feedbackClass = isCorrect ? 'correct' : 'incorrect';
                const feedbackTitle = isCorrect ? '✓ Correct!' : '✗ Incorrect';
                
                html += `
                    <div class="answer-feedback show ${feedbackClass}">
                        <div class="feedback-title">${feedbackTitle}</div>
                        <div class="feedback-text">
                            <strong>Your answer:</strong> ${examData.options[state.selectedAnswer]}<br>
                            <strong>Correct answer:</strong> ${examData.options[examData.correctAnswer]}
                        </div>
                    </div>
                `;
            }

            // Submit button
            if (!state.submitted) {
                html += `
                    <div class="submit-section">
                        <button 
                            class="submit-btn" 
                            id="submitBtn"
                            ${state.selectedAnswer === null || !state.started ? 'disabled' : ''}
                        >
                            Submit Answer
                        </button>
                    </div>
                `;
            } else {
                html += `
                    <div class="exam-completed">
                        <h2>✓ Assessment Completed</h2>
                        <p>Your response has been recorded</p>
                        <p style="font-size: 13px; color: #999;">You can close this window or wait for the next question</p>
                    </div>
                `;
            }

            examBody.innerHTML = html;
            attachEventListeners();
        }

        function attachEventListeners() {
            // Option selection
            const checkboxes = document.querySelectorAll('.option-checkbox');
            checkboxes.forEach((checkbox, index) => {
                checkbox.addEventListener('change', () => {
                    // Uncheck all others
                    checkboxes.forEach((cb, idx) => {
                        if (idx !== index) cb.checked = false;
                    });

                    // Update state
                    state.selectedAnswer = checkbox.checked ? index : null;

                    // Update UI
                    document.querySelectorAll('.option').forEach((opt, idx) => {
                        if (idx === index && checkbox.checked) {
                            opt.classList.add('selected');
                        } else {
                            opt.classList.remove('selected');
                        }
                    });

                    // Update submit button
                    const submitBtn = document.getElementById('submitBtn');
                    if (submitBtn) {
                        submitBtn.disabled = state.selectedAnswer === null;
                    }
                });

                // Click on option label
                if (checkbox.closest('.option')) {
                    checkbox.closest('.option').addEventListener('click', (e) => {
                        if (e.target !== checkbox) {
                            checkbox.click();
                        }
                    });
                }
            });

            // Submit button
            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', submitAnswer);
            }
        }

        function submitAnswer() {
            if (state.selectedAnswer === null) return;

            state.submitted = true;
            clearInterval(state.timerInterval);

            // Send to webhook
            sendToWebhook({
                passage: examData.passage,
                question: examData.question,
                options: examData.options,
                selectedAnswer: state.selectedAnswer,
                selectedText: examData.options[state.selectedAnswer],
                correctAnswer: examData.correctAnswer,
                isCorrect: state.selectedAnswer === examData.correctAnswer,
                timeUsed: examData.timeLimit - state.timeRemaining,
                timestamp: new Date().toISOString()
            });

            renderExam();
        }

        async function sendToWebhook(data) {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    console.error('Webhook error:', response.status);
                }
            } catch (error) {
                console.error('Error sending to webhook:', error);
            }
        }

        // ============== Event Listeners ==============
        startBtn.addEventListener('click', () => {
            if (!state.started) {
                startTimer();
                renderExam();
            }
        });

        restartBtn.addEventListener('click', () => {
            state = {
                started: false,
                submitted: false,
                timeRemaining: examData.timeLimit,
                selectedAnswer: null,
                timerInterval: null
            };
            timerDisplay.classList.remove('warning', 'critical');
            timerDisplay.textContent = '00:00';
            startBtn.disabled = false;
            startBtn.textContent = '▶ Start Exam';
            restartBtn.style.display = 'none';
            examBody.innerHTML = `<div class="not-started"><p>Click <strong>"Start Exam"</strong> button to begin the assessment</p><p style="font-size: 13px; color: #bbb;">The timer will start when you click Start</p></div>`;
        });

        // ============== Load Exam Data from Webhook ==============
        async function loadExamData() {
            try {
                // You can load exam data from webhook here
                // For now, using default data
                renderExam();
            } catch (error) {
                console.error('Error loading exam data:', error);
            }
        }

        // Initialize
        window.addEventListener('load', () => {
            loadExamData();
        });

        // Listen for exam data updates via postMessage
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'EXAM_DATA') {
                examData = event.data.data;
                state.timeRemaining = examData.timeLimit;
                restartBtn.style.display = 'inline-flex';
                renderExam();
            }
        });
    </script>
</body>
</html>
