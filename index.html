<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physio Chat Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 80vh;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #764ba2;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #764ba2;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.bot .message-content {
            background: #e4e6eb;
            color: #333;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }

        button#sendBtn {
            background: #764ba2;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
        }

        .modal-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .typing {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            display: none;
            padding-left: 15px;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="chat-header">
            <h3>Physio Assistant</h3>
        </div>

        <div class="messages-container" id="chatBox"></div>
        <div id="typing" class="typing">AI is typing...</div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type here...">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <div class="modal-overlay" id="examPopup">
        <div class="modal-content">
            <h2 style="color: #764ba2;">📝 Question Ready!</h2>
            <p id="popupText" style="margin: 15px 0; color: #555;">Your assessment is ready to start.</p>
            <button class="modal-btn" onclick="goToExam()">Go to Exam</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typing = document.getElementById('typing');

        const CHAT_WEBHOOK = 'https://n8n2.srv980217.hstgr.cloud/webhook/physio_chatbot';
        const CHECK_TRIGGER_URL = '/api/webhook/check-trigger';

        let lastQuestionId = localStorage.getItem('last_question_id') || '';

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;

            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;

            div.appendChild(content);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function typeWriter(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;

            const content = document.createElement('div');
            content.className = 'message-content';

            div.appendChild(content);
            chatBox.appendChild(div);

            let i = 0;
            function type() {
                if (i < text.length) {
                    content.textContent += text.charAt(i);
                    i++;
                    chatBox.scrollTop = chatBox.scrollHeight;
                    setTimeout(type, 20);
                }
            }
            type();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';
            typing.style.display = 'block';

            try {
                const res = await fetch(CHAT_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if (!res.ok) {
                    throw new Error(`HTTP error: ${res.status}`);
                }

                const reply = await res.text();
                typing.style.display = 'none';

                typeWriter(reply || 'No response from server.', 'bot');

            } catch (e) {
                typing.style.display = 'none';
                addMessage('Error connecting to server.', 'bot');
                console.error(e);
            }
        }

        async function checkForExamTrigger() {
            try {
                const res = await fetch(CHECK_TRIGGER_URL, { cache: 'no-store' });
                const data = await res.json();

                if (!data.hasNew) return;
                if (String(data.id) === String(lastQuestionId)) return;

                const examData = {
                    topic: data.topic || 'General Topic',
                    passage: data.data?.passage || '',
                    question: data.data?.question || '',
                    options: data.data?.options || [],
                    correctAnswer: data.data?.correctAnswer ?? 0,
                    timeLimit: data.data?.timeLimit ?? 600
                };

                localStorage.setItem('current_exam_data', JSON.stringify(examData));
                localStorage.setItem('last_question_id', String(data.id));
                lastQuestionId = String(data.id);

                document.getElementById('popupText').innerText = `Topic: ${examData.topic}`;
                document.getElementById('examPopup').classList.add('show');
            } catch (err) {
                console.error('Polling failed:', err);
            }
        }

        function goToExam() {
            document.getElementById('examPopup').classList.remove('show');
            window.open('exam.html', '_blank');
        }

        sendBtn.onclick = sendMessage;
        userInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        setInterval(checkForExamTrigger, 3000);
        checkForExamTrigger();
    </script>
</body>

</html>
