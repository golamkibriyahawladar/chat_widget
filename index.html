<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physio Chat Bot</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 600px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 5px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f5f5f5;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        /* Typing Indicator CSS */
        .typing {
            font-style: italic;
            font-size: 12px;
            color: #888;
            margin-left: 5px;
            display: none;
        }

        .dot {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% {
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-container {
            display: flex;
            padding: 16px;
            gap: 12px;
            background: white;
            border-top: 1px solid #eee;
        }

        .input-wrapper {
            flex: 1;
            background: #f5f5f5;
            border-radius: 24px;
            padding: 0 16px;
        }

        .input-wrapper input {
            border: none;
            background: transparent;
            padding: 12px 0;
            width: 100%;
            outline: none;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #764ba2;
            color: white;
            cursor: pointer;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            overflow: hidden;
        }

        .modal-header {
            background: #764ba2;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .modal-body {
            padding: 20px;
            text-align: center;
        }

        .modal-footer {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="chat-header">
            <h1>Physio Chat Bot</h1>
            <p>AI Assistant</p>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="welcome-message" style="text-align: center; color: #999; padding: 20px;">
                Start a conversation...
            </div>
        </div>
        <div id="typingIndicator" class="typing" style="padding: 0 20px 10px 20px;">AI is typing<span
                class="dot">.</span><span class="dot" style="animation-delay:0.2s">.</span><span class="dot"
                style="animation-delay:0.4s">.</span></div>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
            </div>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <div class="modal-overlay" id="questionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📝 Question Ready</h2>
            </div>
            <div class="modal-body">
                <p id="modalMessage">Your question is ready!</p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn" style="background:#eee" onclick="hideQuestionModal()">Later</button>
                <button class="modal-btn btn-primary"
                    onclick="window.open('./exam.html', '_blank'); hideQuestionModal();">Go to Test</button>
            </div>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesContainer = document.getElementById('messagesContainer');
        const typingIndicator = document.getElementById('typingIndicator');
        const WEBHOOK_URL = 'https://n8n2.srv980217.hstgr.cloud/webhook-test/physio_chatbot';

        // Pusher Configuration
        const pusher = new Pusher('YOUR_APP_KEY', { cluster: 'YOUR_CLUSTER' });
        const channel = pusher.subscribe('physio-channel');
        channel.bind('trigger-popup', (data) => {
            document.getElementById('modalMessage').textContent = data.message || 'Question is ready!';
            document.getElementById('questionModal').classList.add('show');
        });

        function hideQuestionModal() { document.getElementById('questionModal').classList.remove('show'); }

        // Typing Effect Function
        function typeWriter(text, element, speed = 30) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            // User Message
            addMessage(text, true);
            messageInput.value = '';

            // Show Typing Indicator
            typingIndicator.style.display = 'block';
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();

                typingIndicator.style.display = 'none';
                const botMsg = data.output || data.message || "Done!";
                addMessage(botMsg, false, true); // true means use typing effect
            } catch (e) {
                typingIndicator.style.display = 'none';
                addMessage("Error connecting to server.", false);
            }
        }

        function addMessage(text, isUser, useTyping = false) {
            if (document.querySelector('.welcome-message')) document.querySelector('.welcome-message').remove();

            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            const content = document.createElement('div');
            content.className = 'message-content';

            div.appendChild(content);
            messagesContainer.appendChild(div);

            if (useTyping) {
                typeWriter(text, content);
            } else {
                content.textContent = text;
            }

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>

</html>
